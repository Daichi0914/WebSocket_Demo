name: CD (Deploy to Home Server)

on:
  # 【1】CIのテストが成功した後に自動実行させるトリガー
  workflow_run:
    workflows: ["CI Workflow"]
    branches: ["main"]
    types: [completed]

  # 【2】GitHubの画面から手動で環境を選んで実行させるトリガー
  workflow_dispatch:
    inputs:
      target_env:
        description: 'デプロイ先の環境を選択してください'
        required: true
        type: choice
        options:
          - stg
          - prod

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    
    environment: ${{ inputs.target_env || 'stg' }}
    
    env:
      TARGET_ENV: ${{ inputs.target_env || 'stg' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create environment files
        run: |
          cat << EOF > .env.${{ env.TARGET_ENV }}
          APP_ENV=${{ env.TARGET_ENV }}
          NODE_ENV=production
          RESTART_POLICY=always
          MYSQL_VOLUME_NAME=chat-${{ env.TARGET_ENV }}_chat_mysql_${{ env.TARGET_ENV }}_data
          REDIS_VOLUME_NAME=chat-${{ env.TARGET_ENV }}_chat_redis_${{ env.TARGET_ENV }}_data
          NGINX_PORT=${{ env.TARGET_ENV == 'prod' && '80' || '8080' }}
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DSN=${{ secrets.MYSQL_DSN }}
          MYSQL_EXPOSE=127.0.0.1:3306
          REDIS_ADDR=redis:6379
          REDIS_EXPOSE=127.0.0.1:6379
          FRONTEND_TARGET=runner
          NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL }}
          EOF

      - name: Sync code to project directory
        run: |
          mkdir -p ~/projects/WebSocket_Demo
          rsync -av --delete --exclude='.git' ./ ~/projects/WebSocket_Demo/

      - name: Ensure External Volumes Exist
        run: |
          podman volume create chat-${{ env.TARGET_ENV }}_chat_mysql_${{ env.TARGET_ENV }}_data || true
          podman volume create chat-${{ env.TARGET_ENV }}_chat_redis_${{ env.TARGET_ENV }}_data || true

      - name: Deploy via Systemd
        run: |
          cd ~/projects/WebSocket_Demo
          export XDG_RUNTIME_DIR=/run/user/$(id -u)
          podman-compose -p chat-${{ env.TARGET_ENV }} --env-file .env.${{ env.TARGET_ENV }} build --no-cache frontend
          systemctl --user daemon-reload
          systemctl --user restart chat-${{ env.TARGET_ENV }}.service

      - name: Cleanup old images
        run: podman image prune -f
        continue-on-error: true
