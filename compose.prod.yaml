services:
  nginx:
    image: nginx:alpine
    container_name: chat-nginx-${APP_ENV:-prod}
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

  frontend:
    build:
      context: ./frontend
      target: runner
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    container_name: chat-frontend-${APP_ENV:-prod}
    restart: always
    environment:
      - NODE_ENV=production

  backend:
    build: ./backend
    container_name: chat-backend-${APP_ENV:-prod}
    restart: always
    environment:
      MYSQL_DSN: ${MYSQL_DSN}
      REDIS_ADDR: ${REDIS_ADDR}
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: chat-mysql-${APP_ENV:-prod}
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER:-chat_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - chat_mysql_${APP_ENV:-prod}_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: chat-redis-${APP_ENV:-prod}
    restart: always

volumes:
  chat_mysql_prod_data:
  chat_mysql_stg_data:
