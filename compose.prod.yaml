services:
  nginx:
    image: nginx:alpine
    container_name: chat-nginx-prod
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

  frontend:
    build:
      context: ./frontend
      target: runner
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    container_name: chat-frontend-prod
    restart: always
    environment:
      - NODE_ENV=production

  backend:
    build: ./backend
    container_name: chat-backend-prod
    restart: always
    env_file: .env.prod
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: chat-mysql-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    volumes:
      - chat_mysql_prod_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: chat-redis-prod
    restart: always

volumes:
  chat_mysql_prod_data:
