services:
  nginx:
    image: docker.io/library/nginx:alpine
    container_name: chat-nginx-stg
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

  frontend:
    build:
      context: ./frontend
      target: runner
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    container_name: chat-frontend-stg
    restart: always
    environment:
      - NODE_ENV=production

  backend:
    build: ./backend
    container_name: chat-backend-stg
    restart: always
    environment:
      MYSQL_DSN: ${MYSQL_DSN}
      REDIS_ADDR: ${REDIS_ADDR}
    depends_on:
      - mysql
      - redis

  mysql:
    image: docker.io/library/mysql:8.0
    container_name: chat-mysql-stg
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER:-chat_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - chat_mysql_stg_data:/var/lib/mysql

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: chat-redis-stg
    restart: always

volumes:
  chat_mysql_stg_data:
