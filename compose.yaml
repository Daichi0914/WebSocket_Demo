services:
  nginx:
    image: docker.io/library/nginx:alpine
    container_name: chat-nginx-${APP_ENV}
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: ${RESTART_POLICY:-no}

  frontend:
    build:
      context: ./frontend
      target: ${FRONTEND_TARGET:-dev}
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    container_name: chat-frontend-${APP_ENV}
    restart: ${RESTART_POLICY:-no}
    environment:
      - NODE_ENV=${NODE_ENV:-development}

  backend:
    build: ./backend
    container_name: chat-backend-${APP_ENV}
    restart: ${RESTART_POLICY:-no}
    environment:
      MYSQL_DSN: ${MYSQL_DSN}
      REDIS_ADDR: ${REDIS_ADDR}
    depends_on:
      - mysql
      - redis

  mysql:
    image: docker.io/library/mysql:8.0
    container_name: chat-mysql-${APP_ENV}
    restart: ${RESTART_POLICY:-no}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER:-chat_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_EXPOSE:-127.0.0.1:3306}:3306"
    volumes:
      - chat_mysql_${APP_ENV}_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: chat-redis-${APP_ENV}
    restart: ${RESTART_POLICY:-no}
    ports:
      - "${REDIS_EXPOSE:-127.0.0.1:6379}:6379"

volumes:
  # 環境ごとにボリュームを分離
  chat_mysql_dev_data:
  chat_mysql_stg_data:
  chat_mysql_prod_data:
