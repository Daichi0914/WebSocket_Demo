services:
  nginx:
    image: docker.io/library/nginx:alpine
    container_name: chat-nginx-${APP_ENV}
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: ${RESTART_POLICY:-no}

  frontend:
    build:
      context: ./frontend
      target: ${FRONTEND_TARGET:-dev}
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
    container_name: chat-frontend-${APP_ENV}
    restart: ${RESTART_POLICY:-no}
    environment:
      - NODE_ENV=${NODE_ENV:-development}

  backend:
    build: ./backend
    container_name: chat-backend-${APP_ENV}
    restart: ${RESTART_POLICY:-no}
    environment:
      MYSQL_DSN: ${MYSQL_DSN}
      REDIS_ADDR: ${REDIS_ADDR}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s

  mysql:
    image: docker.io/library/mysql:8.0
    container_name: chat-mysql-${APP_ENV}
    restart: ${RESTART_POLICY:-no}
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER:-chat_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      # ホスト側ポート:コンテナ側ポート
      - "${MYSQL_EXPOSE:-127.0.0.1:3306}:3306"
    volumes:
      - chat_mysql_${APP_ENV}_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: chat-redis-${APP_ENV}
    restart: ${RESTART_POLICY:-no}
    ports:
      - "${REDIS_EXPOSE:-127.0.0.1:6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- E2E Testing Services ---
  mysql-e2e:
    profiles: [e2e]
    image: docker.io/library/mysql:8.0
    container_name: chat-mysql-e2e
    environment:
      MYSQL_ROOT_PASSWORD: ${E2E_MYSQL_ROOT_PASSWORD:-e2e_pass}
      MYSQL_DATABASE: ${E2E_MYSQL_DATABASE:-chatdb_e2e}
    ports:
      - "8082:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${E2E_MYSQL_ROOT_PASSWORD:-e2e_pass}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis-e2e:
    profiles: [e2e]
    image: docker.io/library/redis:7-alpine
    container_name: chat-redis-e2e
    ports:
      - "6380:6379"

  backend-e2e:
    profiles: [e2e]
    build: ./backend
    container_name: chat-backend-e2e
    ports:
      - "8081:8080"
    environment:
      MYSQL_DSN: ${E2E_MYSQL_DSN:-}
      REDIS_ADDR: ${E2E_REDIS_ADDR:-redis-e2e:6379}
    depends_on:
      mysql-e2e:
        condition: service_healthy
      redis-e2e:
        condition: service_started

volumes:
  chat_mysql_dev_data:
  chat_mysql_stg_data:
  chat_mysql_prod_data:
